<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОРБИТА | Глобальный Мониторинг</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-color: #020205;
            --text-color: #ffffff;
            --accent-color: #00f2ff;
            --font: 'Courier New', Courier, monospace;
        }

        body.iss-overhead {
            --bg-color: #f5f5f7;
            --text-color: #000000;
            --accent-color: #ff0055;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font);
            transition: background 1.5s ease-in-out, color 1s;
        }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .ui {
            position: relative; z-index: 10;
            height: 100vh; display: flex;
            flex-direction: column; justify-content: space-between;
            padding: 40px; box-sizing: border-box;
            pointer-events: none;
        }

        .header { pointer-events: auto; }
        .clock { font-size: 4rem; letter-spacing: -3px; margin: 0; font-weight: 100; }
        .label { font-size: 0.7rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 2px; }

        .telemetry {
            background: rgba(0,0,0,0.5); backdrop-filter: blur(15px);
            padding: 25px; border-left: 2px solid var(--accent-color);
            width: fit-content; pointer-events: auto;
        }

        .dist-box { margin-bottom: 20px; }
        .dist-val { font-size: 2.5rem; color: var(--accent-color); }

        .user-tag {
            position: absolute; top: 40px; right: 40px; text-align: right;
            border-right: 2px solid var(--accent-color); padding-right: 15px;
        }

        #status-light {
            width: 10px; height: 10px; border-radius: 50%;
            display: inline-block; background: var(--accent-color);
            margin-right: 10px; box-shadow: 0 0 10px var(--accent-color);
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <main class="ui">
        <div class="user-tag">
            <span class="label">Ваш сектор</span><br>
            <span id="u-coords">ОПРЕДЕЛЕНИЕ...</span>
        </div>

        <section class="header">
            <div id="status-line"><span id="status-light"></span><span class="label">СИСТЕМА СИНХРОНИЗИРОВАНА</span></div>
            <h1 id="time" class="clock">00:00:00</h1>
            <p id="overhead-msg" style="margin-top: 10px; font-weight: bold;">МКС ВНЕ ЗОНЫ ДОСЯГАЕМОСТИ</p>
        </section>

        <section class="telemetry">
            <div class="dist-box">
                <span class="label">Дистанция до цели</span>
                <div id="distance" class="dist-val">--- КМ</div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                <div><span class="label">LAT ISS</span><br><span id="lat-iss">0.00</span></div>
                <div><span class="label">LNG ISS</span><br><span id="lng-iss">0.00</span></div>
            </div>
        </section>
    </main>

    <script>
        let scene, camera, renderer, earth, issModel, userMarker;
        let uLat = null, uLng = null;

        function initScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Освещение
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 3, 5);
            scene.add(sun);

            // Земля
            const loader = new THREE.TextureLoader();
            const earthGeom = new THREE.SphereGeometry(5, 64, 64);
            const earthMat = new THREE.MeshPhongMaterial({
                map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'),
                bumpMap: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg'),
                bumpScale: 0.05
            });
            earth = new THREE.Mesh(earthGeom, earthMat);
            scene.add(earth);

            // Звездный фон
            const starGeom = new THREE.SphereGeometry(80, 32, 32);
            const starMat = new THREE.MeshBasicMaterial({
                map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/galaxy_starfield.png'),
                side: THREE.BackSide
            });
            scene.add(new THREE.Mesh(starGeom, starMat));

            // Модель МКС (Сборная)
            issModel = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.6), new THREE.MeshStandardMaterial({color: 0xcccccc}));
            body.rotation.z = Math.PI/2;
            
            // Солнечные панели (Золотистые)
            const panelGeom = new THREE.PlaneGeometry(0.7, 0.25);
            const panelMat = new THREE.MeshStandardMaterial({color: 0xffaa00, side: THREE.DoubleSide, metalness: 0.8, roughness: 0.2});
            for(let i=0; i<4; i++) {
                const p = new THREE.Mesh(panelGeom, panelMat);
                p.position.set((i < 2 ? -0.3 : 0.3), (i % 2 === 0 ? 0.2 : -0.2), 0);
                issModel.add(p);
            }
            issModel.add(body);
            scene.add(issModel);

            // Маркер пользователя
            userMarker = new THREE.Mesh(
                new THREE.SphereGeometry(0.06, 16, 16),
                new THREE.MeshBasicMaterial({color: 0xff0000})
            );
            scene.add(userMarker);

            camera.position.z = 15;
        }

        // Геолокация
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                uLat = p.coords.latitude;
                uLng = p.coords.longitude;
                document.getElementById('u-coords').innerText = `${uLat.toFixed(2)}°N, ${uLng.toFixed(2)}°E`;
                mapToSphere(userMarker, uLat, uLng, 5.05);
            });
        }

        function mapToSphere(obj, lat, lng, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            obj.position.set(
                -radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }

        function calcDist(lat1, lon1, lat2, lon2, alt) {
            const R = 6371; 
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            const surfaceDist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return Math.sqrt(surfaceDist**2 + alt**2);
        }

        async function updateISS() {
            try {
                const res = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                const data = await res.json();
                
                document.getElementById('lat-iss').innerText = data.latitude.toFixed(2);
                document.getElementById('lng-iss').innerText = data.longitude.toFixed(2);

                mapToSphere(issModel, data.latitude, data.longitude, 6.8); // Орбита чуть выше земли
                issModel.lookAt(0,0,0);

                if (uLat !== null) {
                    const d = calcDist(uLat, uLng, data.latitude, data.longitude, data.altitude);
                    document.getElementById('distance').innerText = Math.round(d) + " КМ";
                    
                    if (d < 1200) {
                        document.body.classList.add('iss-overhead');
                        document.getElementById('overhead-msg').innerText = "ВНИМАНИЕ: МКС В СЕКТОРЕ ВИДИМОСТИ";
                    } else {
                        document.body.classList.remove('iss-overhead');
                        document.getElementById('overhead-msg').innerText = "МКС ЗА ГОРИЗОНТОМ";
                    }
                }
            } catch (e) { console.warn("Сигнал потерян"); }
        }

        function animate() {
            requestAnimationFrame(animate);
            earth.rotation.y += 0.0003;
            renderer.render(scene, camera);
            document.getElementById('time').innerText = new Date().toLocaleTimeString();
        }

        initScene();
        animate();
        setInterval(updateISS, 3000);
        updateISS();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
