<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОРБИТА | Глобальный Наблюдательный Пункт</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root {
            --bg-color: #010103;
            --text-color: #ffffff;
            --accent-color: #00f2ff;
            --danger-color: #ff1212;
            --font: 'Courier New', Courier, monospace;
        }

        body.iss-overhead {
            --bg-color: #f5f5f7;
            --text-color: #000000;
            --accent-color: #ff0055;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font);
            transition: background 1.5s, color 1s;
        }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* Экран загрузки */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s;
        }

        .ui {
            position: relative; z-index: 10;
            height: 100vh; display: flex;
            flex-direction: column; justify-content: space-between;
            padding: 40px; box-sizing: border-box;
            pointer-events: none;
        }

        .header, .telemetry, #planet-card { pointer-events: auto; }
        .clock { font-size: 3.5rem; letter-spacing: -3px; margin: 0; }
        .label { font-size: 0.7rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 2px; }

        .telemetry {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);
            padding: 20px; border-left: 2px solid var(--accent-color);
            width: fit-content;
        }

        .dist-val { font-size: 2rem; color: var(--accent-color); }

        .user-tag {
            position: absolute; top: 40px; right: 40px; text-align: right;
            border-right: 2px solid var(--accent-color); padding-right: 15px;
            pointer-events: auto;
        }

        button {
            background: var(--accent-color); border: none; color: #00;
            padding: 5px 10px; cursor: pointer; font-family: inherit; font-size: 0.7rem;
            margin-top: 10px;
        }

        /* --- КАРТОЧКА ПЛАНЕТЫ (Скрыта по умолчанию) --- */
        #planet-card {
            position: absolute; bottom: 40px; right: 40px;
            width: 300px; padding: 20px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            border: 1px solid var(--accent-color);
            display: none; flex-direction: column;
            animation: slideIn 0.3s ease-out;
            pointer-events: auto;
        }

        #planet-card h3 { margin: 0; font-size: 1.5rem; color: var(--accent-color); }
        #planet-card p { font-size: 0.8rem; line-height: 1.6; margin-top: 10px; }
        
        #close-card {
            position: absolute; top: 10px; right: 10px;
            color: #fff; background: none; border: none;
            cursor: pointer; font-family: inherit;
        }

        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="label">Синхронизация с системой...</div>
        <div id="load-status" style="margin-top: 10px; font-size: 0.8rem;">Загрузка объектов</div>
    </div>

    <div id="canvas-container"></div>

    <main class="ui">
        <div class="user-tag">
            <span class="label">Ваш сектор</span><br>
            <span id="u-coords">ОПРЕДЕЛЕНИЕ...</span><br>
            <button onclick="requestNotifications()">ВКЛ. УВЕДОМЛЕНИЯ</button>
        </div>

        <section class="header">
            <h1 id="time" class="clock">00:00:00</h1>
            <p id="overhead-msg" style="margin-top: 10px; font-weight: bold; font-size: 0.8rem;">ПОИСК СИГНАЛА МКС...</p>
        </section>

        <div id="planet-card">
            <button id="close-card" onclick="closePlanetCard()">[X]</button>
            <h3 id="planet-name">Планета X</h3>
            <p id="planet-desc">Описание отсутствует.</p>
        </div>

        <section class="telemetry">
            <div class="dist-box">
                <span class="label">Дистанция до цели</span>
                <div id="distance" class="dist-val">--- КМ</div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; font-size: 0.8rem;">
                <div><span class="label">LAT ISS</span><br><span id="lat-iss">0.00</span></div>
                <div><span class="label">LNG ISS</span><br><span id="lng-iss">0.00</span></div>
            </div>
        </section>
    </main>

    <script>
        let scene, camera, renderer, controls, earth, issModel, userPin, spaceShader;
        let uLat = null, uLng = null;
        let notificationSent = false;
        let targetISSParams = { lat: 0, lng: 0, alt: 420 };
        let currentISSParams = { lat: 0, lng: 0, alt: 420 };
        const lerpSpeed = 0.05;
        
        let planets = [];
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();

        // --- БАЗА ДАННЫХ О ПЛАНЕТАХ (На русском) ---
        const planetInfoDB = {
            'Солнце': 'Центральная звезда нашей системы. Массивная сфера раскаленной плазмы, дающая свет и жизнь. Температура поверхности ~5,500°C.',
            'Марс': 'Четвертая планета. Известна как "Красная планета" из-за оксида железа. Тонкая атмосфера, полярные шапки и русла высохших рек.',
            'Юпитер': 'Самая большая планета системы. Газовый гигант с Большим Красным Пятном (гигантский шторм) и десятками спутников.',
            'Сатурн': 'Шестая планета. Славится своей потрясающей системой колец, состоящей из льда, камней и пыли. Газовый гигант.',
            'МКС': 'Международная космическая станция. Единственный рукотворный объект, который мы сейчас отслеживаем в реальном времени.'
        };

        function initScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // OrbitControls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.minDistance = 6;
            controls.maxDistance = 1500; // Отдаляем для обзора всей системы

            scene.add(new THREE.AmbientLight(0xffffff, 0.2));
            const sunLight = new THREE.PointLight(0xffffff, 2, 2000);
            sunLight.position.set(150, 50, 150);
            scene.add(sunLight);

            const loader = new THREE.TextureLoader();
            
            // Земля
            const earthGeom = new THREE.SphereGeometry(5, 64, 64);
            const earthMat = new THREE.MeshPhongMaterial({
                map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'),
                bumpMap: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg'),
                bumpScale: 0.05
            });
            earth = new THREE.Mesh(earthGeom, earthMat);
            earth.name = 'Земля'; // Имя для кликов
            scene.add(earth);

            // --- КОСМОС (Густое Звездное Поле - Проверенный метод) ---
            const starsGeometry = new THREE.BufferGeometry();
            const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 1.0 });
            const starsVertices = [];
            for (let i = 0; i < 20000; i++) {
                starsVertices.push((Math.random() - 0.5) * 3000, (Math.random() - 0.5) * 3000, (Math.random() - 0.5) * 3000);
            }
            starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
            scene.add(new THREE.Points(starsGeometry, starsMaterial));

            // --- ПЛАНЕТЫ (С добавлением свечения и траекторий) ---
            const glowVertexShader = `
                varying vec3 vNormal;
                varying vec3 vPositionNormal;
                void main() {
                    vNormal = normalize( normalMatrix * normal );
                    vPositionNormal = normalize( ( modelViewMatrix * vec4(position, 1.0) ).xyz );
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;
            const glowFragmentShader = `
                uniform vec3 glowColor;
                uniform float p;
                uniform float c;
                varying vec3 vNormal;
                varying vec3 vPositionNormal;
                void main() {
                    float a = pow( c - dot(vNormal, vPositionNormal), p );
                    gl_FragColor = vec4( glowColor, a );
                }
            `;

            const pData = [
                { n: 'Солнце', r: 25, d: 250, c: 0xffcc00, g: 0xffffaa, speed: 0.001 },
                { n: 'Марс', r: 2, d: 60, c: 0xff4400, g: 0xffaaaa, speed: 0.005 },
                { n: 'Юпитер', r: 15, d: 130, c: 0xffaa88, g: 0xffccaa, speed: 0.002 },
                { n: 'Сатурн', r: 12, d: 200, c: 0xeeeeaa, g: 0xffffcc, speed: 0.0015 }
            ];

            pData.forEach(p => {
                const group = new THREE.Group();
                
                // Модель планеты
                const meshMat = new THREE.MeshPhongMaterial({ color: p.c, shininess: 50 });
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(p.r, 32, 32), meshMat);
                mesh.position.x = p.d;
                mesh.name = p.n; // Уникальное имя для клика
                
                // --- ШЕЙДЕРНОЕ СВЕЧЕНИЕ (Более надежное) ---
                const glowMat = new THREE.ShaderMaterial({
                    vertexShader: glowVertexShader,
                    fragmentShader: glowFragmentShader,
                    uniforms: {
                        c: { type: "f", value: 0.8 },
                        p: { type: "f", value: 3.5 }, // Настройка силы
                        glowColor: { type: "c", value: new THREE.Color(p.g) }
                    },
                    side: THREE.BackSide,
                    blending: THREE.AdditiveBlending,
                    transparent: true
                });
                const glowMesh = new THREE.Mesh(new THREE.SphereGeometry(p.r * 1.15, 32, 32), glowMat);
                mesh.add(glowMesh);

                group.add(mesh);
                scene.add(group);

                // --- ТРАЕКТОРИЯ ОРБИТЫ (Тонкая линия - Torus) ---
                const trajectoryMat = new THREE.MeshBasicMaterial({ color: p.c, transparent: true, opacity: 0.15 });
                const trajectoryGeom = new THREE.TorusGeometry(p.d, 0.05, 8, 200);
                const trajectory = new THREE.Mesh(trajectoryGeom, trajectoryMat);
                trajectory.rotation.x = Math.PI / 2;
                scene.add(trajectory);

                planets.push({ mesh: group, planetMesh: mesh, speed: p.speed });
            });

            // МКС (Более видимая)
            issModel = new THREE.Group();
            const matMtl = new THREE.MeshStandardMaterial({color: 0xcccccc});
            const matPan = new THREE.MeshStandardMaterial({color: 0xb37a1a, side: THREE.DoubleSide});
            const truss = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 1), matMtl);
            truss.rotation.z = Math.PI/2;
            issModel.add(truss);
            for(let i=0; i<4; i++) {
                const p = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.15), matPan);
                p.position.set(i < 2 ? -0.3 : 0.3, 0, (i%2===0?0.1:-0.1));
                p.rotation.x = Math.PI/2;
                issModel.add(p);
            }
            issModel.scale.set(0.6, 0.6, 0.6); // Увеличили еще больше
            issModel.name = 'МКС'; // Имя для клика
            const issLight = new THREE.PointLight(0x00f2ff, 1.5, 7); 
            issModel.add(issLight);
            
            scene.add(issModel);

            // КРАСНАЯ БУЛАВКА
            userPin = new THREE.Group();
            const pinLeg = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.3, 12), new THREE.MeshBasicMaterial({color: 0xff0000}));
            pinLeg.position.y = 0.15;
            const pinHead = new THREE.Mesh(new THREE.SphereGeometry(0.08), new THREE.MeshBasicMaterial({color: 0xff0000}));
            pinHead.position.y = 0.3;
            userPin.add(pinLeg, pinHead);
            scene.add(userPin);
            userPin.visible = false; 

            camera.position.set(10, 10, 25);
            
            // --- ПОДКЛЮЧЕНИЕ СЛУШАТЕЛЯ КЛИКОВ ---
            window.addEventListener('click', onDocumentMouseDown, false);
        }

        // --- ЛОГИКА ОПРЕДЕЛЕНИЯ КЛИКА ПО ПЛАНЕТЕ (Raycaster) ---
        function onDocumentMouseDown(event) {
            // Нормализуем координаты мыши (от -1 до +1)
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            // Обновляем Raycaster на основе позиции камеры и мыши
            raycaster.setFromCamera(mouse, camera);

            // Получаем список объектов, которые пересекает луч
            const intersects = raycaster.intersectObjects(scene.children, true);

            if (intersects.length > 0) {
                let obj = intersects[0].object;
                
                // Если кликнули по МКС (ее сгруппированным частям)
                if (obj.parent && obj.parent.name === 'МКС') obj = obj.parent;
                // Если кликнули по Земле
                if (obj.name === 'Земля') showPlanetCard(obj.name, "Ваша домашняя планета. Единственная известная планета, населенная живыми существами.");

                // Ищем имя планеты в БД
                if (planetInfoDB[obj.name]) {
                    showPlanetCard(obj.name, planetInfoDB[obj.name]);
                }
            }
        }

        // --- ФУНКЦИИ КАРТОЧКИ (UI) ---
        function showPlanetCard(name, desc) {
            document.getElementById('planet-name').innerText = name;
            document.getElementById('planet-desc').innerText = desc;
            document.getElementById('planet-card').style.display = 'flex';
        }

        function closePlanetCard() {
            document.getElementById('planet-card').style.display = 'none';
        }

        function requestNotifications() { Notification.requestPermission(); }

        function mapToSphere(obj, lat, lng, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            obj.position.set(
                -radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                uLat = p.coords.latitude; uLng = p.coords.longitude;
                document.getElementById('u-coords').innerText = uLat.toFixed(2) + "°N, " + uLng.toFixed(2) + "°E";
                userPin.visible = true;
                mapToSphere(userPin, uLat, uLng, 5);
                userPin.lookAt(userPin.position.clone().multiplyScalar(2));
                userPin.rotateX(Math.PI/2);
                camera.position.set(userPin.position.x*2, userPin.position.y*2, userPin.position.z*2);
            });
        }

        async function updateISS() {
            try {
                const res = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                const data = await res.json();
                targetISSParams = { lat: data.latitude, lng: data.longitude, alt: data.altitude };
                document.getElementById('lat-iss').innerText = data.latitude.toFixed(2);
                document.getElementById('lng-iss').innerText = data.longitude.toFixed(2);
                
                if (uLat) {
                    const R = 6371; const dLat = (data.latitude-uLat)*Math.PI/180; const dLon = (data.longitude-uLng)*Math.PI/180;
                    const a = Math.sin(dLat/2)**2 + Math.cos(uLat*Math.PI/180)*Math.cos(data.latitude*Math.PI/180)*Math.sin(dLon/2)**2;
                    const d = Math.sqrt((R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a)))**2 + data.altitude**2);
                    document.getElementById('distance').innerText = Math.round(d) + " КМ";
                }
                document.getElementById('loading-screen').style.opacity = "0";
                setTimeout(()=>document.getElementById('loading-screen').style.display="none", 1000);
            } catch (e) {}
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            planets.forEach(p => { p.mesh.rotation.y += p.speed; });
            currentISSParams.lat = THREE.MathUtils.lerp(currentISSParams.lat, targetISSParams.lat, lerpSpeed);
            currentISSParams.lng = THREE.MathUtils.lerp(currentISSParams.lng, targetISSParams.lng, lerpSpeed);
            mapToSphere(issModel, currentISSParams.lat, currentISSParams.lng, 5.5); // Орбита чуть выше
            issModel.lookAt(0,0,0); issModel.rotateY(Math.PI/2);
            renderer.render(scene, camera);
            document.getElementById('time').innerText = new Date().toLocaleTimeString();
        }

        initScene(); animate(); setInterval(updateISS, 3000); updateISS();
    </script>
</body>
</html>
