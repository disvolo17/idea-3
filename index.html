<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОРБИТА | Система Наблюдения</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-color: #030305;
            --text-color: #ffffff;
            --accent-color: #00f2ff;
            --font: 'Courier New', Courier, monospace;
        }

        /* Плавная смена темы при пролете над регионом */
        body.iss-overhead {
            --bg-color: #fdfdfd;
            --text-color: #0a0a0a;
            --accent-color: #0051ff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font);
            transition: background 2.5s ease-in-out, color 2s;
        }

        #canvas-container { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 1; 
        }

        .ui-overlay {
            position: relative; z-index: 10;
            height: 100vh; display: grid;
            grid-template-columns: 1fr 380px;
            padding: 50px; box-sizing: border-box;
            pointer-events: none;
        }

        .main-view { display: flex; flex-direction: column; justify-content: space-between; pointer-events: auto; }

        .log-area {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            padding: 20px;
            width: 100%; max-width: 700px;
            margin-top: 30px;
        }

        textarea {
            background: transparent; border: none; color: var(--text-color);
            font-family: var(--font); font-size: 1.1rem; outline: none;
            resize: none; width: 100%; height: 250px;
        }

        .sidebar { 
            border-left: 1px solid rgba(255,255,255,0.1); 
            padding-left: 30px; pointer-events: auto; 
            display: flex; flex-direction: column; justify-content: center;
        }

        .clock { font-size: 4.5rem; font-weight: 100; letter-spacing: -4px; margin: 0; }
        .label { font-size: 0.7rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 2px; }
        
        .telemetry-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; }
        .data-box { border-top: 1px solid var(--accent-color); padding-top: 10px; }
        .val { font-size: 1.2rem; color: var(--accent-color); }

        button {
            background: transparent; color: var(--text-color);
            border: 1px solid var(--text-color); padding: 12px;
            cursor: pointer; margin-top: 30px; font-family: inherit;
            transition: 0.3s;
        }
        button:hover { background: var(--text-color); color: var(--bg-color); }

        /* Эффект сканирования */
        .scanline {
            width: 100%; height: 100px; z-index: 5;
            background: linear-gradient(0deg, transparent, rgba(0, 242, 255, 0.05), transparent);
            position: absolute; animation: scan 8s linear infinite;
        }
        @keyframes scan { from { top: -100px; } to { top: 100vh; } }
    </style>
</head>
<body>

    <div class="scanline"></div>
    <div id="canvas-container"></div>

    <main class="ui-overlay">
        <section class="main-view">
            <div>
                <p class="label">Текущее время по Гринвичу (UTC)</p>
                <h1 id="time" class="clock">00:00:00</h1>
                <p style="max-width: 500px; line-height: 1.6;">
                    Станция движется над регионом: <span id="location" style="font-weight: bold; color: var(--accent-color);">ОПРЕДЕЛЕНИЕ...</span>
                </p>
            </div>
            
            <div class="log-area">
                <span class="label">Дневник наблюдений / Задачи витка:</span>
                <textarea id="notes" placeholder="Записывайте идеи, пока МКС в зоне видимости..."></textarea>
            </div>
        </section>

        <aside class="sidebar">
            <div class="telemetry-grid">
                <div class="data-box">
                    <span class="label">Широта</span>
                    <div id="lat" class="val">0.000</div>
                </div>
                <div class="data-box">
                    <span class="label">Долгота</span>
                    <div id="lng" class="val">0.000</div>
                </div>
                <div class="data-box">
                    <span class="label">Высота</span>
                    <div id="alt" class="val">420 км</div>
                </div>
                <div class="data-box">
                    <span class="label">Скорость</span>
                    <div class="val">27,600</div>
                </div>
            </div>

            <button onclick="toggleAudio()">СЛУШАТЬ ЭФИР КОСМОСА</button>
            <p style="font-size: 0.6rem; opacity: 0.4; margin-top: 50px;">
                ДАННЫЕ: NASA / WHERE-THE-ISS<br>
                ENGINE: THREE.JS WIREFRAME V3
            </p>
        </aside>
    </main>

    <script>
        let scene, camera, renderer, earth, issGroup;
        let audioCtx, noiseNode;

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Земля - Геометрическая сфера
            const earthGeom = new THREE.IcosahedronGeometry(5, 10);
            const earthMat = new THREE.MeshBasicMaterial({ color: 0x444444, wireframe: true, transparent: true, opacity: 0.2 });
            earth = new THREE.Mesh(earthGeom, earthMat);
            scene.add(earth);

            // Модель МКС (Группа из нескольких объектов)
            issGroup = new THREE.Group();
            
            // Основной модуль
            const coreGeom = new THREE.CylinderGeometry(0.1, 0.1, 0.6, 8);
            const coreMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff });
            const core = new THREE.Mesh(coreGeom, coreMat);
            core.rotation.z = Math.PI/2;
            issGroup.add(core);

            // Солнечные панели
            const panelGeom = new THREE.PlaneGeometry(0.8, 0.3);
            const panelMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff, side: THREE.DoubleSide, wireframe: true });
            const p1 = new THREE.Mesh(panelGeom, panelMat);
            p1.position.y = 0.3;
            issGroup.add(p1);
            const p2 = p1.clone();
            p2.position.y = -0.3;
            issGroup.add(p2);

            scene.add(issGroup);
            camera.position.z = 15;
        }

        async function updateISS() {
            try {
                const res = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                const data = await res.json();
                
                document.getElementById('lat').innerText = data.latitude.toFixed(3);
                document.getElementById('lng').innerText = data.longitude.toFixed(3);
                document.getElementById('alt').innerText = data.altitude.toFixed(0) + " км";

                // Позиционирование МКС на орбите
                const phi = (90 - data.latitude) * (Math.PI / 180);
                const theta = (data.longitude + 180) * (Math.PI / 180);
                const radius = 8; // Высота орбиты в 3D пространстве

                issGroup.position.set(
                    -radius * Math.sin(phi) * Math.cos(theta),
                    radius * Math.cos(phi),
                    radius * Math.sin(phi) * Math.sin(theta)
                );
                issGroup.lookAt(0,0,0);

                // Смена темы по широте (например, пролет над Европой/РФ)
                if (data.latitude > 45 && data.latitude < 65) {
                    document.body.classList.add('iss-overhead');
                    document.getElementById('location').innerText = "ВАШИМ РЕГИОНОМ (ФАЗА ОБЗОРА)";
                } else {
                    document.body.classList.remove('iss-overhead');
                    document.getElementById('location').innerText = "ОТКРЫТЫМ ОКЕАНОМ";
                }
            } catch (e) { console.log("Связь прервана..."); }
        }

        function toggleAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(120, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.01, audioCtx.currentTime);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
            } else {
                audioCtx.state === 'running' ? audioCtx.suspend() : audioCtx.resume();
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            earth.rotation.y += 0.001;
            issGroup.rotation.y += 0.01; // Вращение панелей
            renderer.render(scene, camera);
            
            const now = new Date();
            document.getElementById('time').innerText = now.toISOString().split('T')[1].split('.')[0];
        }

        init3D();
        animate();
        setInterval(updateISS, 5000);
        updateISS();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
