<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ОРБИТА | Мобильный Планетарий</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { --bg-color: #010103; --text-color: #ffffff; --accent-color: #00f2ff; --font: 'Courier New', Courier, monospace; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg-color); color: var(--text-color); font-family: var(--font); touch-action: none; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 15px; box-sizing: border-box; pointer-events: none; z-index: 10; }
        .header, .telemetry, #planet-card, .user-tag { pointer-events: auto; }
        
        .clock { font-size: 2.5rem; margin: 0; letter-spacing: -2px; }
        .label { font-size: 0.6rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
        
        .user-tag { text-align: right; border-right: 2px solid var(--accent-color); padding-right: 10px; font-size: 0.8rem; align-self: flex-end; }
        .telemetry { background: rgba(0,0,0,0.85); padding: 15px; border-left: 3px solid var(--accent-color); max-width: 100%; }
        .dist-val { font-size: 1.5rem; color: var(--accent-color); }

        /* Адаптивная карточка планеты */
        #planet-card {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 320px; background: rgba(10, 10, 15, 0.95);
            border: 1px solid var(--accent-color); padding: 20px; display: none; flex-direction: column;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }
        #planet-card h3 { margin: 0; color: var(--accent-color); font-size: 1.4rem; }
        #planet-card p { font-size: 0.9rem; line-height: 1.4; margin: 15px 0; }
        .close-btn { align-self: flex-end; background: var(--accent-color); color: #000; border: none; padding: 5px 15px; cursor: pointer; font-weight: bold; }

        @media (min-width: 768px) {
            .clock { font-size: 4rem; }
            .ui { padding: 40px; }
            #planet-card { top: auto; left: auto; bottom: 40px; right: 40px; transform: none; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="ui">
        <div class="user-tag">
            <span class="label">Сектор</span><br><span id="u-coords">...</span>
        </div>
        <div class="header">
            <h1 id="time" class="clock">00:00:00</h1>
            <p id="msg" style="font-size: 0.7rem; margin: 5px 0;">СИНХРОНИЗАЦИЯ...</p>
        </div>
        <div id="planet-card">
            <h3 id="p-name">Марс</h3>
            <p id="p-desc">Загрузка данных...</p>
            <button class="close-btn" onclick="closeCard()">ЗАКРЫТЬ</button>
        </div>
        <div class="telemetry">
            <span class="label">Дистанция до МКС</span>
            <div id="distance" class="dist-val">--- КМ</div>
            <div style="display: flex; gap: 20px; margin-top: 5px; font-size: 0.7rem;">
                <div>LAT: <span id="lat-iss">0</span></div>
                <div>LNG: <span id="lng-iss">0</span></div>
            </div>
        </div>
    </div>

<script>
    let scene, camera, renderer, controls, issModel, userPin, planets = [];
    let uLat, uLng, targetISS = {lat:0, lng:0}, curISS = {lat:0, lng:0};
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const info = {
        'Солнце': 'Центральная звезда. 99% массы всей системы. Источник энергии.',
        'Марс': 'Красная планета. Здесь самые высокие горы в Солнечной системе.',
        'Юпитер': 'Газовый гигант. Его масса в 2.5 раза больше всех планет вместе взятых.',
        'Сатурн': 'Планета с самыми заметными кольцами из льда и пыли.',
        'Земля': 'Ваш дом. Единственное место с жидкой водой на поверхности.',
        'МКС': 'Международная космическая станция на высоте ~400 км.'
    };

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 5000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.rotateSpeed = 0.5;

        // Свет
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));
        const light = new THREE.PointLight(0xffffff, 1.5, 1000);
        light.position.set(100, 50, 100);
        scene.add(light);

        // Звезды
        const starGeo = new THREE.BufferGeometry();
        const starCoords = [];
        for(let i=0; i<10000; i++) starCoords.push((Math.random()-0.5)*2000, (Math.random()-0.5)*2000, (Math.random()-0.5)*2000);
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
        scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0x888888, size: 0.7})));

        // Земля
        const loader = new THREE.TextureLoader();
        const earthGeo = new THREE.SphereGeometry(5, 48, 48);
        const earthMat = new THREE.MeshPhongMaterial({
            map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg')
        });
        const earth = new THREE.Mesh(earthGeo, earthMat);
        earth.name = 'Земля';
        scene.add(earth);

        // Планеты
        const pConfigs = [
            {n:'Солнце', r:18, d:200, c:0xffaa00, s:0.001},
            {n:'Марс', r:2.5, d:50, c:0xff4422, s:0.006},
            {n:'Юпитер', r:12, d:110, c:0xd4a373, s:0.002},
            {n:'Сатурн', r:10, d:170, c:0xe9c46a, s:0.0015}
        ];

        pConfigs.forEach(p => {
            const group = new THREE.Group();
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(p.r, 32, 32), new THREE.MeshPhongMaterial({color:p.c}));
            mesh.position.x = p.d;
            mesh.name = p.n;
            group.add(mesh);
            scene.add(group);

            // Траектория
            const orbGeo = new THREE.TorusGeometry(p.d, 0.15, 8, 120);
            const orbMat = new THREE.MeshBasicMaterial({color: p.c, transparent:true, opacity:0.2});
            const orb = new THREE.Mesh(orbGeo, orbMat);
            orb.rotation.x = Math.PI/2;
            scene.add(orb);

            planets.push({group, mesh, speed:p.s});
        });

        // МКС
        issModel = new THREE.Group();
        const truss = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.1, 0.1), new THREE.MeshStandardMaterial({color:0xaaaaaa}));
        issModel.add(truss);
        issModel.scale.set(0.8, 0.8, 0.8);
        issModel.name = 'МКС';
        scene.add(issModel);

        userPin = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({color:0xff0000}));
        scene.add(userPin);

        camera.position.set(15, 10, 20);

        // Ивенты
        window.addEventListener('resize', onResize);
        window.addEventListener('click', onClick);
        window.addEventListener('touchstart', onTouch, {passive: false});
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function handleInteraction(x, y) {
        mouse.x = (x / window.innerWidth) * 2 - 1;
        mouse.y = -(y / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(scene.children, true);
        if(hits.length > 0) {
            let obj = hits[0].object;
            while(obj.parent && !info[obj.name]) obj = obj.parent;
            if(info[obj.name]) {
                document.getElementById('p-name').innerText = obj.name;
                document.getElementById('p-desc').innerText = info[obj.name];
                document.getElementById('planet-card').style.display = 'flex';
            }
        }
    }

    function onClick(e) { handleInteraction(e.clientX, e.clientY); }
    function onTouch(e) { handleInteraction(e.touches[0].clientX, e.touches[0].clientY); }
    function closeCard() { document.getElementById('planet-card').style.display = 'none'; }

    function posToSphere(lat, lng, rad) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        return new THREE.Vector3(
            -rad * Math.sin(phi) * Math.cos(theta),
            rad * Math.cos(phi),
            rad * Math.sin(phi) * Math.sin(theta)
        );
    }

    if(navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(p => {
            uLat = p.coords.latitude; uLng = p.coords.longitude;
            document.getElementById('u-coords').innerText = uLat.toFixed(2) + "°N " + uLng.toFixed(2) + "°E";
            userPin.position.copy(posToSphere(uLat, uLng, 5.1));
        });
    }

    async function fetchISS() {
        try {
            const res = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
            const data = await res.json();
            targetISS = {lat: data.latitude, lng: data.longitude};
            document.getElementById('lat-iss').innerText = data.latitude.toFixed(2);
            document.getElementById('lng-iss').innerText = data.longitude.toFixed(2);
            if(uLat) {
                const dist = Math.sqrt(Math.pow(data.latitude-uLat,2) + Math.pow(data.longitude-uLng,2)) * 111;
                document.getElementById('distance').innerText = Math.round(dist) + " КМ";
            }
        } catch(e) {}
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        planets.forEach(p => p.group.rotation.y += p.speed);
        curISS.lat = THREE.MathUtils.lerp(curISS.lat, targetISS.lat, 0.05);
        curISS.lng = THREE.MathUtils.lerp(curISS.lng, targetISS.lng, 0.05);
        issModel.position.copy(posToSphere(curISS.lat, curISS.lng, 5.6));
        issModel.lookAt(0,0,0);
        renderer.render(scene, camera);
        document.getElementById('time').innerText = new Date().toLocaleTimeString();
    }

    init(); animate(); setInterval(fetchISS, 3000); fetchISS();
</script>
</body>
</html>
