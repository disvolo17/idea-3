<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОРБИТА | Интерактивный Мониторинг</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root {
            --bg-color: #020205;
            --text-color: #ffffff;
            --accent-color: #00f2ff;
            --font: 'Courier New', Courier, monospace;
        }

        body.iss-overhead {
            --bg-color: #f5f5f7;
            --text-color: #000000;
            --accent-color: #ff0055;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font);
            transition: background 1.5s, color 1s;
        }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* Экран загрузки */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s;
        }

        .ui {
            position: relative; z-index: 10;
            height: 100vh; display: flex;
            flex-direction: column; justify-content: space-between;
            padding: 40px; box-sizing: border-box;
            pointer-events: none;
        }

        .header, .telemetry { pointer-events: auto; }
        .clock { font-size: 3.5rem; letter-spacing: -3px; margin: 0; }
        .label { font-size: 0.7rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 2px; }

        .telemetry {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);
            padding: 20px; border-left: 2px solid var(--accent-color);
            width: fit-content;
        }

        .dist-val { font-size: 2rem; color: var(--accent-color); }

        .user-tag {
            position: absolute; top: 40px; right: 40px; text-align: right;
            border-right: 2px solid var(--accent-color); padding-right: 15px;
            pointer-events: auto;
        }

        button {
            background: var(--accent-color); border: none; color: #000;
            padding: 5px 10px; cursor: pointer; font-family: inherit; font-size: 0.7rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="label">Установка связи с МКС...</div>
        <div id="load-status" style="margin-top: 10px; font-size: 0.8rem;">Инициализация систем</div>
    </div>

    <div id="canvas-container"></div>

    <main class="ui">
        <div class="user-tag">
            <span class="label">Ваш сектор</span><br>
            <span id="u-coords">ОПРЕДЕЛЕНИЕ...</span><br>
            <button onclick="requestNotifications()">ВКЛ. УВЕДОМЛЕНИЯ</button>
        </div>

        <section class="header">
            <h1 id="time" class="clock">00:00:00</h1>
            <p id="overhead-msg" style="margin-top: 10px; font-weight: bold; font-size: 0.8rem;">СИНХРОНИЗАЦИЯ ОРБИТЫ...</p>
        </section>

        <section class="telemetry">
            <div class="dist-box">
                <span class="label">Дистанция до цели</span>
                <div id="distance" class="dist-val">--- КМ</div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; font-size: 0.8rem;">
                <div><span class="label">LAT ISS</span><br><span id="lat-iss">0.00</span></div>
                <div><span class="label">LNG ISS</span><br><span id="lng-iss">0.00</span></div>
            </div>
        </section>
    </main>

    <script>
        let scene, camera, renderer, controls, earth, issModel, userMarker;
        let uLat = null, uLng = null;
        let notificationSent = false;

        function initScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Интерактивность: вращение мышкой
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.minDistance = 7;
            controls.maxDistance = 30;

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 3, 5);
            scene.add(sun);

            const loader = new THREE.TextureLoader();
            
            // Земля
            const earthGeom = new THREE.SphereGeometry(5, 64, 64);
            const earthMat = new THREE.MeshPhongMaterial({
                map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'),
                bumpMap: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg'),
                bumpScale: 0.05
            });
            earth = new THREE.Mesh(earthGeom, earthMat);
            scene.add(earth);

            // Звезды
            const starGeom = new THREE.SphereGeometry(80, 32, 32);
            const starMat = new THREE.MeshBasicMaterial({
                map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/galaxy_starfield.png'),
                side: THREE.BackSide
            });
            scene.add(new THREE.Mesh(starGeom, starMat));

            // Модель МКС
            issModel = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.6), new THREE.MeshStandardMaterial({color: 0xcccccc}));
            body.rotation.z = Math.PI/2;
            const panelGeom = new THREE.PlaneGeometry(0.7, 0.25);
            const panelMat = new THREE.MeshStandardMaterial({color: 0xffaa00, side: THREE.DoubleSide, metalness: 0.8});
            for(let i=0; i<4; i++) {
                const p = new THREE.Mesh(panelGeom, panelMat);
                p.position.set((i < 2 ? -0.3 : 0.3), (i % 2 === 0 ? 0.2 : -0.2), 0);
                issModel.add(p);
            }
            issModel.add(body);
            scene.add(issModel);

            // Ваш маркер (сделал больше и ярче)
            userMarker = new THREE.Mesh(
                new THREE.SphereGeometry(0.12, 16, 16),
                new THREE.MeshBasicMaterial({color: 0xff0000, transparent: true, opacity: 0.8})
            );
            scene.add(userMarker);

            camera.position.set(0, 5, 15);
        }

        function requestNotifications() {
            Notification.requestPermission();
        }

        function sendNotification(dist) {
            if (Notification.permission === "granted" && !notificationSent) {
                new Notification("МКС рядом!", {
                    body: `Станция пролетает в ${Math.round(dist)} км от вас. Посмотрите в небо!`,
                    icon: "https://cdn-icons-png.flaticon.com/512/2026/2026524.png"
                });
                notificationSent = true; 
            }
        }

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                uLat = p.coords.latitude;
                uLng = p.coords.longitude;
                document.getElementById('u-coords').innerText = `${uLat.toFixed(2)}°N, ${uLng.toFixed(2)}°E`;
                mapToSphere(userMarker, uLat, uLng, 5.08);
                // Фокусируем камеру на пользователе при загрузке
                camera.position.set(userMarker.position.x * 2, userMarker.position.y * 2, userMarker.position.z * 2);
                controls.update();
                document.getElementById('load-status').innerText = "Координаты получены";
            }, () => {
                document.getElementById('load-status').innerText = "Геолокация отклонена";
            });
        }

        function mapToSphere(obj, lat, lng, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            obj.position.set(
                -radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }

        function calcDist(lat1, lon1, lat2, lon2, alt) {
            const R = 6371; 
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            const surfaceDist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return Math.sqrt(surfaceDist**2 + alt**2);
        }

        async function updateISS() {
            try {
                const res = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                const data = await res.json();
                
                document.getElementById('lat-iss').innerText = data.latitude.toFixed(2);
                document.getElementById('lng-iss').innerText = data.longitude.toFixed(2);

                mapToSphere(issModel, data.latitude, data.longitude, 6.8);
                issModel.lookAt(0,0,0);

                if (uLat !== null) {
                    const d = calcDist(uLat, uLng, data.latitude, data.longitude, data.altitude);
                    document.getElementById('distance').innerText = Math.round(d) + " КМ";
                    
                    if (d < 1200) {
                        document.body.classList.add('iss-overhead');
                        document.getElementById('overhead-msg').innerText = "МКС В ЗОНЕ ПРЯМОЙ ВИДИМОСТИ";
                        sendNotification(d);
                    } else {
                        document.body.classList.remove('iss-overhead');
                        document.getElementById('overhead-msg').innerText = "МКС ЗА ГОРИЗОНТОМ";
                        notificationSent = false; 
                    }
                }
                
                // Скрываем экран загрузки после получения первых данных
                const loader = document.getElementById('loading-screen');
                if (loader.style.opacity !== "0") {
                    loader.style.opacity = "0";
                    setTimeout(() => loader.style.display = "none", 1000);
                }
            } catch (e) { console.warn("Связь потеряна"); }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            document.getElementById('time').innerText = new Date().toLocaleTimeString();
        }

        initScene();
        animate();
        setInterval(updateISS, 3000);
        updateISS();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
