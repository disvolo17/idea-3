<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОРБИТА | Система Слежения</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-color: #010103;
            --text-color: #ffffff;
            --accent-color: #00f2ff;
            --font: 'Courier New', Courier, monospace;
        }

        body.iss-overhead {
            --bg-color: #f0f2f5;
            --text-color: #050505;
            --accent-color: #ff0055;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font);
            transition: background 2s, color 1s;
        }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .ui-panel {
            position: relative; z-index: 10;
            height: 100vh; display: flex;
            flex-direction: column; justify-content: space-between;
            padding: 40px; box-sizing: border-box;
            pointer-events: none;
        }

        .header { pointer-events: auto; }
        .clock { font-size: 5rem; font-weight: 100; letter-spacing: -5px; margin: 0; }
        .label { font-size: 0.75rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 2px; }

        .stats-container {
            display: flex; gap: 60px; pointer-events: auto;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
            padding: 20px; border-left: 3px solid var(--accent-color);
            width: fit-content;
        }

        .stat-item { display: flex; flex-direction: column; }
        .stat-val { font-size: 1.8rem; color: var(--accent-color); }

        .user-loc { position: absolute; top: 40px; right: 40px; text-align: right; }
        
        #distance-alert {
            font-size: 1.2rem; margin-top: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <main class="ui-panel">
        <div class="user-loc">
            <span class="label">Ваши координаты</span><br>
            <span id="user-coords">ОПРЕДЕЛЕНИЕ...</span>
        </div>

        <section class="header">
            <h1 id="time" class="clock">00:00:00</h1>
            <p class="label">Дистанция до МКС:</p>
            <div id="distance-val" style="font-size: 3rem; color: var(--accent-color);">--- КМ</div>
            <div id="location-text">ОЖИДАНИЕ ТЕЛЕМЕТРИИ...</div>
        </section>

        <section class="stats-container">
            <div class="stat-item">
                <span class="label">Широта ISS</span>
                <span id="iss-lat" class="stat-val">0.00</span>
            </div>
            <div class="stat-item">
                <span class="label">Долгота ISS</span>
                <span id="iss-lng" class="stat-val">0.00</span>
            </div>
            <div class="stat-item">
                <span class="label">Скорость</span>
                <span class="stat-val">27,600 км/ч</span>
            </div>
        </section>
    </main>

    <script>
        let scene, camera, renderer, earth, issGroup, userMarker;
        let userLat = null, userLng = null;

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Освещение
            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambient);
            const sun = new THREE.PointLight(0xffffff, 1);
            sun.position.set(20, 10, 20);
            scene.add(sun);

            // Создание Земли с текстурой карты
            const earthGeom = new THREE.SphereGeometry(5, 64, 64);
            const loader = new THREE.TextureLoader();
            // Используем публичную текстуру карты мира
            const earthTex = loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
            const earthMat = new THREE.MeshPhongMaterial({ map: earthTex, bumpScale: 0.05 });
            earth = new THREE.Mesh(earthGeom, earthMat);
            scene.add(earth);

            // Звезды
            const starGeom = new THREE.SphereGeometry(90, 32, 32);
            const starMat = new THREE.MeshBasicMaterial({
                map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/galaxy_starfield.png'),
                side: THREE.BackSide
            });
            scene.add(new THREE.Mesh(starGeom, starMat));

            // Модель МКС
            issGroup = new THREE.Group();
            const core = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.5), new THREE.MeshBasicMaterial({color: 0x00f2ff}));
            core.rotation.z = Math.PI/2;
            const panels = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.3), new THREE.MeshBasicMaterial({color: 0xffffff, side: THREE.DoubleSide, wireframe: true}));
            issGroup.add(core, panels);
            scene.add(issGroup);

            // Маркер пользователя
            userMarker = new THREE.Mesh(new THREE.SphereGeometry(0.05), new THREE.MeshBasicMaterial({color: 0xff0000}));
            scene.add(userMarker);

            camera.position.z = 15;
        }

        // Получение геолокации пользователя
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                userLat = pos.coords.latitude;
                userLng = pos.coords.longitude;
                document.getElementById('user-coords').innerText = `${userLat.toFixed(2)}, ${userLng.toFixed(2)}`;
                updateMarker(userMarker, userLat, userLng, 5.05);
            });
        }

        function updateMarker(obj, lat, lng, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            obj.position.set(
                -radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }

        // Расчет дистанции (Формула Гаверсинуса + высота)
        function calculateDistance(lat1, lon1, lat2, lon2, alt2) {
            const R = 6371; // Радиус Земли
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const surfaceDist = R * c;
            // Учитываем высоту МКС через теорему Пифагора (приблизительно)
            return Math.sqrt(Math.pow(surfaceDist, 2) + Math.pow(alt2, 2));
        }

        async function updateISS() {
            try {
                const res = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                const data = await res.json();
                
                document.getElementById('iss-lat').innerText = data.latitude.toFixed(2);
                document.getElementById('iss-lng').innerText = data.longitude.toFixed(2);

                updateMarker(issGroup, data.latitude, data.longitude, 7);
                issGroup.lookAt(0,0,0);

                if (userLat !== null) {
                    const dist = calculateDistance(userLat, userLng, data.latitude, data.longitude, data.altitude);
                    document.getElementById('distance-val').innerText = Math.round(dist) + " КМ";
                    
                    if (dist < 1000) {
                        document.body.classList.add('iss-overhead');
                        document.getElementById('location-text').innerText = "МКС В ЗОНЕ ПРЯМОЙ ВИДИМОСТИ";
                    } else {
                        document.body.classList.remove('iss-overhead');
                        document.getElementById('location-text').innerText = "МКС ЗА ГОРИЗОНТОМ";
                    }
                }
            } catch (e) { console.log("Lost link..."); }
        }

        function animate() {
            requestAnimationFrame(animate);
            earth.rotation.y += 0.0005;
            renderer.render(scene, camera);
            document.getElementById('time').innerText = new Date().toLocaleTimeString();
        }

        init3D();
        animate();
        setInterval(updateISS, 3000);
        updateISS();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
